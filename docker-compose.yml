version: '3.8'

services:
  aidash:
    build: .
    container_name: aidash-os
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - ./backend/users.json:/app/backend/users.json
      - ./server.log:/app/server.log
      # POWER: Access to host filesystem (read/write)
      - /:/host:rw
      # POWER: Access to host NetworkManager (for WiFi)
      - /var/run/dbus:/var/run/dbus
    privileged: true
    network_mode: "host"
