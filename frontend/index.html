<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiDash - Server Dashboard</title>
    <style>
        :root {
            --bg: #111;
            --text: #eee;
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --card-bg: #222;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 15px; }
        .stat-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 14px; opacity: 0.7; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; background: var(--primary); color: white; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .login-page { display: flex; align-items: center; justify-content: center; height: 100vh; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #444; background: #333; color: white; border-radius: 4px; box-sizing: border-box; }
        .hidden { display: none; }
        .alert { padding: 10px; border-left: 5px solid; margin-bottom: 10px; }
        .alert-warning { border-color: orange; background: rgba(255, 165, 0, 0.1); }
        .alert-danger { border-color: var(--danger); background: rgba(220, 53, 69, 0.1); }
        .ai-chat { background: #1a1a1a; padding: 15px; border-radius: 8px; height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .ai-message { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; align-self: flex-start; max-width: 80%; }
        .user-message { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 10px; align-self: flex-end; max-width: 80%; }
        .command-palette { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); width: 500px; background: #222; border: 1px solid #444; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .palette-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .palette-item:hover { background: #333; }
        .progress-bar { background: #444; border-radius: 10px; overflow: hidden; height: 10px; margin-top: 5px; }
        .progress-fill { background: var(--primary); height: 100%; }
        .log-viewer { background: black; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 300px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login-container" class="login-page">
        <div class="card" style="width: 300px;">
            <h2>AiDash Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" style="width: 100%;">Login</button>
            <div id="login-error" style="color: var(--danger); margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="dashboard" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>AiDash Dashboard</h1>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="grid">
            <div class="card"><div id="cpu-stat" class="stat-value">...</div><div class="stat-label">System Load (1m)</div><div class="progress-bar"><div id="cpu-fill" class="progress-fill" style="width: 0%;"></div></div></div>
            <div class="card"><div id="ram-stat" class="stat-value">...</div><div class="stat-label">RAM (Free / Total)</div><div class="progress-bar"><div id="ram-fill" class="progress-fill" style="width: 0%;"></div></div></div>
            <div class="card"><div id="disk-summary" class="stat-value">...</div><div class="stat-label">Disk Capacity</div><div class="progress-bar"><div id="disk-fill" class="progress-fill" style="width: 0%;"></div></div></div>
            <div class="card"><div id="uptime-stat" class="stat-value">...</div><div class="stat-label">System Uptime</div></div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Processes</h3>
                <div id="services-list" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="card">
                <h3>Alerts</h3>
                <div id="alerts-list">No active alerts.</div>
            </div>
            <div class="card">
                <h3>Disk Usage Explorer</h3>
                <div id="disk-explorer"></div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>AI Assistant</h3>
                <div id="ai-chat" class="ai-chat"></div>
                <div style="display: flex; margin-top: 10px;">
                    <input type="text" id="ai-prompt" placeholder="Ask AI something..." style="margin: 0; margin-right: 10px;">
                    <button onclick="askAi()">Ask</button>
                </div>
            </div>
            <div class="card">
                <h3>System Logs</h3>
                <div id="log-viewer" class="log-viewer">Loading...</div>
                <button onclick="fetchLogs()" style="margin-top: 10px; padding: 5px 10px; font-size: 12px; background: var(--secondary);">Refresh Logs</button>
            </div>
        </div>
    </div>

    <div id="command-palette" class="command-palette">
        <input type="text" id="palette-input" placeholder="Type a command..." style="border: none; border-bottom: 1px solid #444; border-radius: 8px 8px 0 0;">
        <div id="palette-items">
            <div class="palette-item" onclick="executeCommand('df -h')">Check Disk Usage</div>
            <div class="palette-item" onclick="executeCommand('ps aux')">List All Processes</div>
            <div class="palette-item" onclick="executeCommand('uptime')">System Uptime</div>
            <div class="palette-item" onclick="executeCommand('ls -la')">List Project Files</div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('role', data.role);
                showDashboard();
            } else {
                document.getElementById('login-error').textContent = data.message;
            }
        }

        function showDashboard() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            fetchStats(); fetchServices(); fetchAlerts(); fetchDisk(); fetchLogs();
            setInterval(fetchStats, 5000); setInterval(fetchDisk, 30000); setInterval(fetchLogs, 10000); setInterval(fetchServices, 15000);
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                const load = data.load[0];
                const cpuPercent = Math.min(100, (load / data.cpus) * 100);
                const freeGB = (data.freeMem / 1024 / 1024 / 1024).toFixed(1);
                const totalGB = (data.totalMem / 1024 / 1024 / 1024).toFixed(1);
                const ramUsage = ((data.totalMem - data.freeMem) / data.totalMem) * 100;
                
                document.getElementById('uptime-stat').textContent = Math.floor(data.uptime / 3600) + 'h ' + Math.floor((data.uptime % 3600) / 60) + 'm';
                document.getElementById('ram-stat').textContent = (totalGB - freeGB).toFixed(1) + ' / ' + totalGB + ' GB';
                document.getElementById('cpu-stat').textContent = load.toFixed(2);
                document.getElementById('cpu-fill').style.width = cpuPercent + '%';
                document.getElementById('ram-fill').style.width = ramUsage + '%';
            } catch (e) {}
        }

        async function fetchServices() {
            const res = await fetch('/api/services');
            const data = await res.json();
            const list = document.getElementById('services-list');
            list.innerHTML = data.map(s => `
                <div style="margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center;">
                    <div>${s.name}</div>
                    <span style="color: var(--success); font-size: 11px;">running</span>
                </div>
            `).join('');
        }

        async function fetchAlerts() {
            const res = await fetch('/api/alerts');
            const data = await res.json();
            const list = document.getElementById('alerts-list');
            if (data.length === 0) { list.textContent = "No active alerts."; return; }
            list.innerHTML = data.map(a => `
                <div class="alert alert-${a.severity}"><strong>${a.type}</strong>: ${a.message}</div>
            `).join('');
        }

        async function fetchDisk() {
            try {
                const res = await fetch('/api/disk');
                const data = await res.json();
                if (data.length === 0) return;
                const list = document.getElementById('disk-explorer');
                const d = data[0];
                document.getElementById('disk-summary').textContent = d.usage;
                document.getElementById('disk-fill').style.width = d.usage;
                list.innerHTML = data.map(d => `
                    <div style="margin-bottom: 10px;">
                        <div style="font-size: 14px;"><strong>${d.path}</strong>: ${d.used} / ${d.size}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${d.usage}; background: ${parseInt(d.usage) > 85 ? 'var(--danger)' : 'var(--success)'}"></div></div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function fetchLogs() {
            const res = await fetch('/api/logs');
            const data = await res.text();
            const viewer = document.getElementById('log-viewer');
            viewer.textContent = data;
            viewer.scrollTop = viewer.scrollHeight;
        }

        async function askAi() {
            const promptInput = document.getElementById('ai-prompt');
            const prompt = promptInput.value;
            if (!prompt) return;
            const chat = document.getElementById('ai-chat');
            chat.innerHTML += `<div class="user-message">${prompt}</div>`;
            promptInput.value = '';
            const res = await fetch('/api/ai/ask', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) });
            const data = await res.json();
            chat.innerHTML += `<div class="ai-message">${data.text} ${data.suggestion ? `<br><br><button onclick="executeCommand('${data.suggestion}')">Approve: ${data.suggestion}</button>` : ''}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        async function executeCommand(command) {
            const chat = document.getElementById('ai-chat');
            chat.innerHTML += `<div class="user-message">Executing: ${command}</div>`;
            const res = await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ command }) });
            const data = await res.json();
            chat.innerHTML += `<div class="ai-message"><pre style="font-size: 10px; background: #000; padding: 5px; overflow-x: auto;">${data.output}</pre></div>`;
            chat.scrollTop = chat.scrollHeight;
            document.getElementById('command-palette').style.display = 'none';
        }

        function logout() { localStorage.removeItem('role'); location.reload(); }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                const palette = document.getElementById('command-palette');
                palette.style.display = palette.style.display === 'block' ? 'none' : 'block';
                if (palette.style.display === 'block') document.getElementById('palette-input').focus();
            }
        });

        if (localStorage.getItem('role')) showDashboard();
    </script>
</body>
</html>
